---
name: csit-perf-report
run-name: csit-${{ github.event.inputs.dut }}-perf-report-${{ github.event.inputs.job_type }}-${{ github.event.inputs.branch == 'rls2606' && '2606' }}-${{ github.event.inputs.node }}-${{ github.event.inputs.hfr_run_id }}

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
    inputs:
      job_type:
        description: "The type of job: iterative or coverage."
        required: true
        type: choice
        options:
          - iterative
          - coverage
        default: iterative
      dut:
        description: "CSIT test/ subdirectory containing suites to execute."
        required: true
        type: choice
        options:
          - dpdk
          - trex
          - vpp
        default: vpp
      node:
        description: Performance testbed node.
        required: true
        type: choice
        options:
          - 2n-aws
          - 2n-c6in
          - 2n-c7gn
          - 2n-c8gn
          - 2n-emr
          - 2n-gnr
          - 2n-grc
          - 2n-icx
          - 2n-spr
          - 2n-zn2
          - 3n-alt
          - 3n-emr
          - 3n-gnr
          - 3n-icx
          - 3n-oct
          - 3n-srf
          - 3na-spr
          - 3nb-spr
        default: 2n-emr
      branch:
        description: Branch or patch.
        required: true
        type: choice
        options:
          - rls2606
        default: rls2606
      suite_gen_params:
        description: Parameters for the suite generator.
        required: true
        type: string
      hfr_run_id:
        description: HFR run ID.
        required: true
        type: string

permissions:
  contents: read

jobs:
  dispatch:
    runs-on:
      - ubuntu-latest

    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

    steps:
      - name: Prepare node selection matrix
        id: set-matrix
        # yamllint disable-line rule:line-length
        uses: fdio/csit/.github/actions/csit-report-dispatch@cee2088675d00de5f4a47f386a6c05315bfc170c
        with:
          node: ${{ github.event.inputs.node }}
          dut: ${{ github.event.inputs.dut }}

  csit-perf-report:
    needs: dispatch
    # yamllint disable-line rule:line-length
    name: csit-${{ github.event.inputs.dut }}-perf-report-${{ github.event.inputs.job_type }}-${{ github.event.inputs.branch == 'rls2606' && '2606' }}-${{ matrix.node }}
    runs-on:
      - self-hosted
      - nomad
      - fdio:arch=${{ matrix.executor_arch }}
      - fdio:class=builder
      - fdio:size=csit
      - fdio:namespace=prod
      - fdio:os=${{ matrix.os }}
      - fdio:workflow=${{ github.run_id }}
    timeout-minutes: 1440

    strategy:
      matrix: ${{ fromJSON(needs.dispatch.outputs.matrix) }}

    env:
      # yamllint disable-line rule:line-length
      BUILD_TAG: csit-${{ github.event.inputs.dut }}-perf-report-${{ github.event.inputs.job_type }}-${{ github.event.inputs.branch == 'rls2606' && '2606' }}-${{ matrix.node }}-${{ github.run_id }}
      # yamllint disable-line rule:line-length
      JOB_NAME: csit-${{ github.event.inputs.dut }}-perf-report-${{ github.event.inputs.job_type }}-${{ github.event.inputs.branch == 'rls2606' && '2606' }}-${{ matrix.node }}
      GERRIT_BRANCH: ${{ github.event.inputs.branch }}
      TEST_TAG_STRING: ${{ github.event.inputs.suite_gen_params }}

    steps:
      - name: Git Checkout CSIT
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98  # v6.0.2
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0

      - name: Setup Environment
        # yamllint disable-line rule:line-length
        uses: fdio/.github/.github/actions/setup-executor-env@1b8eff3ffd9d355b28052be9ad22acc57b3430b5

      - name: Run CSIT Bootstrap
        # yamllint disable-line rule:line-length
        uses: fdio/csit/.github/actions/csit-bootstrap@cee2088675d00de5f4a47f386a6c05315bfc170c
        with:
          bootstrap_script: bootstrap_verify_perf.sh
          with_oper: false

      - name: AWS S3 Publish Logs
        if: ${{ !cancelled() && (success() || failure()) }}
        # yamllint disable-line rule:line-length
        uses: fdio/.github/.github/actions/aws-s3-publish-logs@1b8eff3ffd9d355b28052be9ad22acc57b3430b5
        with:
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_region: ${{ vars.AWS_REGION }}
          s3_bucket: ${{ vars.S3_BUCKET }}
          # yamllint disable-line rule:line-length
          s3_path: csit-${{ github.event.inputs.dut }}-perf-report-${{ github.event.inputs.job_type }}-${{ github.event.inputs.branch == 'rls2606' && '2606' }}-${{ matrix.node }}/${{ github.run_id }}