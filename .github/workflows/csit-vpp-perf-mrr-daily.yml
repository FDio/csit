---
name: csit-vpp-perf-mrr-daily

# yamllint disable-line rule:truthy
on:
  # Runs periodically
  schedule:
    - cron: "30 22 * * 0-4"

jobs:
  csit-vpp-perf-mrr-daily:
    name: csit-vpp-perf-mrr-daily-master-${{ matrix.node }}
    runs-on:
      - self-hosted
      - nomad
      - fdio:arch=${{ matrix.executor_arch }}
      - fdio:class=builder
      - fdio:size=csit
      - fdio:namespace=prod
      - fdio:os=${{ matrix.os }}
      - fdio:workflow=${{ github.run_id }}
    timeout-minutes: 1440

    strategy:
      matrix:
        include:
          - node: 2n-grc
            os: ubuntu2404
            executor_arch: aarch64
          - node: 2n-icx
            os: ubuntu2404
            executor_arch: x86_64
          - node: 2n-spr
            os: ubuntu2404
            executor_arch: x86_64
          - node: 2n-zn2
            os: ubuntu2404
            executor_arch: x86_64
          - node: 3n-icx
            os: ubuntu2404
            executor_arch: x86_64
          - node: 3n-alt
            os: ubuntu2404
            executor_arch: aarch64
          - node: 3n-srf
            os: ubuntu2404
            executor_arch: x86_64
          - node: 3na-spr
            os: ubuntu2404
            executor_arch: x86_64
          - node: 3nb-spr
            os: ubuntu2404
            executor_arch: x86_64
          - node: 2n-emr
            os: ubuntu2404
          - node: 2n-gnr
            os: ubuntu2404
            executor_arch: x86_64
          - node: 3n-emr
            os: ubuntu2404
            executor_arch: x86_64
          - node: 3n-oct
            os: ubuntu2404
            executor_arch: aarch64
      fail-fast: false

    env:
      JOB_NAME: ${{ github.job }}-master-${{ matrix.node }}
      BUILD_TAG: ${{ github.job }}-master-${{ matrix.node }}-${{ github.run_id }}

    steps:
      - name: Setup Environment
        # yamllint disable-line rule:line-length
        uses: fdio/.github/.github/actions/setup-executor-env@1b8eff3ffd9d355b28052be9ad22acc57b3430b5

      - name: Checkout and bootstrap CSIT
        # yamllint disable-line rule:line-length
        uses: fdio/csit/.github/actions/fetch-and-maybe-bootstrap@master
        with:
          repo_dir: /scratch/docker-build/csit
          depth: 1
          with_oper: true
          script: bootstrap_verify_perf.sh

      - name: AWS S3 Publish Logs
        if: ${{ !cancelled() && (success() || failure()) }}
        # yamllint disable-line rule:line-length
        uses: fdio/.github/.github/actions/aws-s3-publish-logs@1b8eff3ffd9d355b28052be9ad22acc57b3430b5
        with:
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_region: ${{ vars.AWS_REGION }}
          s3_bucket: ${{ vars.S3_BUCKET }}
          # yamllint disable-line rule:line-length
          s3_path: ${{ github.job }}-master-${{ matrix.node }}/${{ github.run_id }}