---
name: csit-cdash-version

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:

jobs:
  verify:
    runs-on:
      - self-hosted
      - nomad
      - fdio:arch=x86_64
      - fdio:class=builder
      - fdio:size=csit
      - fdio:namespace=prod
      - fdio:os=ubuntu2404
      - fdio:workflow=${{ github.run_id }}

    env:
      JOB_NAME: ${{ github.workflow }}-${{ github.job }}
      BUILD_ID: ${{ github.run_number }}

    steps:
      - name: Setup Environment
        # yamllint disable-line rule:line-length
        uses: fdio/.github/.github/actions/setup-executor-env@1b8eff3ffd9d355b28052be9ad22acc57b3430b5

      - name: Checkout and bootstrap CSIT
        # yamllint disable-line rule:line-length
        uses: fdio/csit/.github/actions/fetch-and-maybe-bootstrap@master
        with:
          repo_dir: /scratch/docker-build/csit
          depth: 1
          script: bootstrap_aws_eb_version_${{ github.job }}.sh

  deploy:
    needs: verify
    runs-on:
      - self-hosted
      - nomad
      - fdio:arch=x86_64
      - fdio:class=builder
      - fdio:size=csit
      - fdio:namespace=prod
      - fdio:os=ubuntu2404
      - fdio:workflow=${{ github.run_id }}

    env:
      JOB_NAME: ${{ github.workflow }}-${{ github.job }}
      BUILD_ID: ${{ github.run_number }}

    steps:
      - name: Setup Environment
        # yamllint disable-line rule:line-length
        uses: fdio/.github/.github/actions/setup-executor-env@1b8eff3ffd9d355b28052be9ad22acc57b3430b5

      - name: Checkout and bootstrap CSIT
        # yamllint disable-line rule:line-length
        uses: fdio/csit/.github/actions/fetch-and-maybe-bootstrap@master
        with:
          depth: 1
          script: bootstrap_aws_eb_version_${{ github.job }}.sh

