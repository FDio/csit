---
# file: tasks/ice.yaml

- name: get ice network adapter driver
  ansible.builtin.uri:
    url: "{{ intel_sourceforge_download_url }}/{{ intel_ice_url[ice] }}"
    follow_redirects: "all"
    force: true
    dest: "{{ intel_extract_dir }}/ice-{{ ice }}.tar.gz"
    mode: "0644"
  failed_when: false
  tags:
    - intel-inst

- name: extract ice network adapter driver
  ansible.builtin.unarchive:
    remote_src: true
    src: "{{ intel_extract_dir }}/ice-{{ ice }}.tar.gz"
    dest: "{{ intel_extract_dir }}/"
    creates: "{{ intel_extract_dir }}/ice-{{ ice }}"
  register: intel_driver_extracted
  tags:
    - intel-inst

- name: install ice network adapter driver
  ansible.builtin.command: "{{ item }}"
  args:
    chdir: "{{ intel_extract_dir }}/ice-{{ ice }}/src"
  become: true
  with_items:
    - "make install"
    #- "modprobe -r ice"
    - "modprobe ice"
  when:
    - intel_driver_extracted is not skipped
  tags:
    - intel-inst

- name: get dynamic device personalization (dpp) package
  ansible.builtin.get_url:
    url: "{{ intel_download_url }}/{{ intel_ddp_url[ddp] }}"
    dest: "{{ intel_extract_dir }}/800-Series-Comms-Binary-Package-{{ ddp }}.zip"
    mode: 0644
  tags:
    - intel-inst

- name: extract dynamic device personalization (dpp) package
  ansible.builtin.unarchive:
    remote_src: true
    src: "{{ intel_extract_dir }}/800-Series-Comms-Binary-Package-{{ ddp }}.zip"
    dest: "{{ intel_extract_dir }}/"
    creates: "{{ intel_extract_dir }}/ice_comms-{{ ddp }}.zip"
  tags:
    - intel-inst

- name: copy dynamic device personalization (dpp) package
  ansible.builtin.copy:
    src: "{{ intel_extract_dir }}/ice_comms-{{ ddp }}.pkg"
    dest: "/lib/firmware/intel/ice/ddp/ice-{{ ddp }}.pkg"
    remote_src: true
    follow: true
  tags:
    - intel-inst

- name: link dynamic device personalization (dpp) package
  ansible.builtin.file:
    src: "ice-{{ ddp }}.pkg"
    dest: "/lib/firmware/intel/ice/ddp/ice.pkg"
    state: link
  tags:
    - intel-inst

- name: extract dynamic device personalization (dpp) package (cleanup)
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  with_items:
    - "{{ intel_extract_dir }}/E810 DDP for Comms TechGuide_Rev2.3.pdf"
    - "{{ intel_extract_dir }}/Intel_800_series_market_segment_DDP_license.txt"
  tags:
    - intel-inst
