---
# file: defaults/main.yaml

packages: "{{ packages_base + packages_by_distro[ansible_facts['distribution'] | lower] + packages_by_arch[ansible_facts['machine']] }}"

packages_base:
  - "cpufrequtils"

packages_by_distro:
  ubuntu:
    - []

packages_by_arch:
  aarch64:
    - []
  x86_64:
    - []
