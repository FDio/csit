---
# file: tasks/ofed.yaml

- name: get ofed
  ansible.builtin.get_url:
    url: "{{ mellanox_download_url }}/MLNX_OFED-{{ ofed }}/MLNX_OFED_LINUX-{{ ofed }}-{{ ansible['distribution']|lower }}{{ ansible['distribution_version'] }}-{{ ansible['machine'] }}.tgz"
    dest: "{{ mellanox_extract_dir }}/MLNX_OFED_LINUX-{{ ofed }}-{{ ansible['distribution']|lower }}{{ ansible['distribution_version'] }}-{{ ansible['machine'] }}.tgz"
    mode: "0644"
  when: mellanox_pcis.stdout_lines | length > 0
  tags:
    - mellanox-inst-drivers

- name: extract ofed
  ansible.builtin.unarchive:
    remote_src: true
    src: "{{ mellanox_extract_dir }}/MLNX_OFED_LINUX-{{ ofed }}-{{ ansible['distribution']|lower }}{{ ansible['distribution_version'] }}-{{ ansible['machine'] }}.tgz"
    dest: "{{ mellanox_extract_dir }}/"
    creates: "{{ mellanox_extract_dir }}/MLNX_OFED_LINUX-{{ ofed }}-{{ ansible['distribution']|lower }}{{ ansible['distribution_version'] }}-{{ ansible['machine'] }}"
  register: mellanox_firmware_extracted
  tags:
    - mellanox-inst-drivers

- name: install ofed
  ansible.builtin.command: "./mlnxofedinstall --with-mft --dpdk --force --upstream-libs" # --without-fw-update"
  args:
    chdir: "{{ mellanox_extract_dir }}/MLNX_OFED_LINUX-{{ ofed }}-{{ ansible['distribution']|lower }}{{ ansible['distribution_version'] }}-{{ ansible['machine'] }}"
  when: mellanox_firmware_extracted
  tags:
    - mellanox-inst-drivers

- name: switch infiniband to ethernet
  ansible.builtin.command: "mlxconfig --yes --dev {{ item }} set LINK_TYPE_P1=2 LINK_TYPE_P2=2"
  with_items: "{{ mellanox_pcis.stdout_lines }}"
  failed_when: false
  changed_when: false
  tags:
    - mellanox-inst-drivers